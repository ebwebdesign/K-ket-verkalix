<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Köket Överkalix</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #111;
      border-bottom: 1px solid #333;
      z-index: 1000;
      padding: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 30px;
      font-weight: 900;
    }

    .logo span {
      color: #e56bff;
      font-style: italic;
      text-shadow: 0 0 15px #e56bff;
    }

    .menu-icon {
      font-size: 36px;
    }

    main {
      padding: 150px 22px 60px;
      max-width: 800px;
      margin: auto;
    }

    .small-title {
      color: #e56bff;
      letter-spacing: 8px;
      text-align: center;
      font-weight: bold;
      margin-bottom: 15px;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      line-height: 1.1;
      margin-bottom: 40px;
      font-weight: 900;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 35px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 0 25px rgba(229, 107, 255, 0.08);
    }

    .item {
      border-bottom: 1px solid #333;
      padding: 20px 0;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item h3 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .item p {
      color: #aaa;
      margin: 0 0 15px;
    }

    button {
      background: #e56bff;
      color: black;
      border: none;
      padding: 14px 20px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 15px;
      margin-top: 10px;
      margin-bottom: 15px;
      background: #050505;
      border: 1px solid #333;
      border-radius: 16px;
      color: white;
      font-size: 16px;
    }

    label {
      font-weight: bold;
    }

    .cart-row {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      border-bottom: 1px solid #333;
      padding: 12px 0;
    }

    .remove {
      background: transparent;
      color: #e56bff;
      padding: 0;
      font-size: 14px;
    }

    .sms-btn {
      width: 100%;
      margin-top: 20px;
      font-size: 18px;
      padding: 18px;
    }

    .success {
      display: none;
      text-align: center;
      padding-top: 70px;
    }

    .success-icon {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 30px;
      background: rgba(229, 107, 255, 0.18);
      border: 2px solid #e56bff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 55px;
      color: #e56bff;
      box-shadow: 0 0 25px rgba(229, 107, 255, 0.5);
    }

    .success h2 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .success p {
      color: #aaa;
      font-size: 24px;
      line-height: 1.5;
    }

    .new-order {
      background: transparent;
      color: #e56bff;
      font-size: 22px;
      margin-top: 25px;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">KÖKET <span>Restaurang</span></div>
    <div class="menu-icon">☰</div>
  </header>

  <main>
    <section id="orderPage">
      <div class="small-title">TAKE AWAY SYSTEMS</div>
      <h1>ONLINE BESTÄLLNING</h1>

      <div class="card">
        <h2>Meny</h2>

        <div class="item">
          <h3>Pizza 1</h3>
          <p>Beskrivning här</p>
          <button onclick="addToCart('Pizza 1')">Lägg till</button>
        </div>

        <div class="item">
          <h3>Pizza 2</h3>
          <p>Beskrivning här</p>
          <button onclick="addToCart('Pizza 2')">Lägg till</button>
        </div>

        <div class="item">
          <h3>Kebabtallrik</h3>
          <p>Beskrivning här</p>
          <button onclick="addToCart('Kebabtallrik')">Lägg till</button>
        </div>

        <div class="item">
          <h3>Hamburgare</h3>
          <p>Beskrivning här</p>
          <button onclick="addToCart('Hamburgare')">Lägg till</button>
        </div>
      </div>

      <div class="card">
        <h2>Din beställning</h2>
        <div id="cart"></div>

        <label>Ditt namn</label>
        <input id="customerName" placeholder="Skriv ditt namn" />

        <label>Ditt telefonnummer</label>
        <input id="customerPhone" placeholder="Skriv ditt telefonnummer" />

        <label>Hämtningstid</label>
        <input id="pickupTime" placeholder="Exempel: 17:30" />

        <label>Kommentar</label>
        <textarea id="comment" placeholder="Exempel: utan lök, extra sås"></textarea>

        <button class="sms-btn" onclick="sendSMS()">Skicka beställning via SMS</button>
      </div>
    </section>

    <section id="successPage" class="success">
      <h1>ONLINE BESTÄLLNING</h1>

      <div class="card">
        <div class="success-icon">🕒</div>
        <h2>Tack!</h2>
        <p>
          Din beställning är skapad.<br>
          Restaurangen bekräftar vid behov.
        </p>

        <button class="new-order" onclick="newOrder()">Gör en ny beställning</button>
      </div>
    </section>
  </main>

  <script>
    const RESTAURANG_TELEFON = "0701234567";

    let cart = [];

    function addToCart(name) {
      cart.push(name);
      renderCart();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      renderCart();
    }

    function renderCart() {
      const cartDiv = document.getElementById("cart");

      if (cart.length === 0) {
        cartDiv.innerHTML = "<p style='color:#aaa;'>Ingen maträtt vald ännu.</p>";
        return;
      }

      cartDiv.innerHTML = cart.map((item, index) => `
        <div class="cart-row">
          <span>${index + 1}. ${item}</span>
          <button class="remove" onclick="removeFromCart(${index})">Ta bort</button>
        </div>
      `).join("");
    }

    function sendSMS() {
      if (cart.length === 0) {
        alert("Lägg till minst en maträtt först.");
        return;
      }

      const name = document.getElementById("customerName").value;
      const phone = document.getElementById("customerPhone").value;
      const pickup = document.getElementById("pickupTime").value;
      const comment = document.getElementById("comment").value;

      const orderText =
`Hej! Jag vill beställa:

${cart.map((item, index) => `${index + 1}. ${item}`).join("\n")}

Namn: ${name}
Telefon: ${phone}
Hämtningstid: ${pickup}
Kommentar: ${comment}`;

      window.location.href = `sms:${RESTAURANG_TELEFON}?&body=${encodeURIComponent(orderText)}`;

      setTimeout(() => {
        document.getElementById("orderPage").style.display = "none";
        document.getElementById("successPage").style.display = "block";
        window.scrollTo(0, 0);
      }, 700);
    }

    function newOrder() {
      cart = [];
      renderCart();

      document.getElementById("customerName").value = "";
      document.getElementById("customerPhone").value = "";
      document.getElementById("pickupTime").value = "";
      document.getElementById("comment").value = "";

      document.getElementById("successPage").style.display = "none";
      document.getElementById("orderPage").style.display = "block";
      window.scrollTo(0, 0);
    }

    renderCart();
  </script>

</body>
</html>
